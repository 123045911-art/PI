services:
  # --- SERVIDOR FASTAPI ---
  fastapi:
    build: ./fastapi-app
    container_name: FastAPIVisioflow
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi-app:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:visioflow123@postgres:5432/contador_personas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - visioflow-net

  flask_service:
    build:
      context: ./contador_personas_flask
      dockerfile: Dockerfile
    container_name: FlaskVisioflow
    ports:
      - "5000:5000"
    volumes:
      - ./contador_personas_flask:/app
    depends_on:
      - fastapi
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - FLASK_APP=run.py
      - FLASK_DEBUG=1
    networks:
      - visioflow-net

  # --- SERVICIO LARAVEL DASHBOARD ---
  laravel:
    build: ./contador_dashboard
    container_name: LaravelVisioflow
    ports:
      - "8085:8000"
    volumes:
      - ./contador_dashboard:/var/www/html
      - /var/www/html/vendor
    depends_on:
      fastapi:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # URL interna del API usando el nombre del servicio Docker
      - INTERNAL_API_URL=http://fastapi:8000/api/v1
      - APP_ENV=local
      - APP_DEBUG=true
      # Key por defecto para no romper el arranque inicial
      - APP_KEY=base64:9KM+d724Xbh0CPIzWgi18RZxHByd0rKwICoM7BR9IdU=
      # Laravel NO debe tocar la DB. Forzamos drivers sin DB.
      - DB_CONNECTION=null
      - DATABASE_URL=null
      # --- OPTIMIZACIÓN OCTANE ---
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stack
      # Octane Variables
      - OCTANE_SERVER=swoole
    networks:
      - visioflow-net

  # --- REDIS PARA CACHÉ Y SESIONES ---
  redis:
    image: redis:alpine
    container_name: RedisVisioflow
    ports:
      - "6379:6379"
    networks:
      - visioflow-net

  # --- BASE DE DATOS ---
  postgres:
    image: postgres:15
    container_name: PostgreSqlVisioflow
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: visioflow123
      POSTGRES_DB: contador_personas
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d contador_personas"]
      interval: 5s
      retries: 5
      timeout: 5s
    networks:
      - visioflow-net

volumes:
  postgres_data:

networks:
  visioflow-net:
    driver: bridge