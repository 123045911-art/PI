services:
  # --- SERVIDOR FASTAPI ---
  fastapi:
    build: ./fastapi-app
    container_name: FastAPIVisioflow
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi-app:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:visioflow123@postgres:5432/contador_personas

  # # --- SERVICIO FLASK ---
  # flask:
  #   build: ./flask-app
  #   container_name: FlaskVisioflow
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./flask-app:/app
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
