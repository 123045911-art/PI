  #     DB_PASSWORD: 123456

  # --- BASE DE DATOS ---
  postgres:
    image: postgres:15
    container_name: PostgreSqlVisioflow
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: visioflow123
      POSTGRES_DB: contador_personas
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d contador_personas"]
      interval: 5s
      retries: 5
      timeout: 5s

volumes:
  postgres_data: