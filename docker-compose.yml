  # # --- SERVICIO LARAVEL ---
  # laravel:
  #   build: ./laravel-app
  #   container_name: LaravelVisioflow
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./laravel-app:/var/www/html
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DB_CONNECTION: pgsql
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_DATABASE: contador_personas
