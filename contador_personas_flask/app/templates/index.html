<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISIOFLOW - Contador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="nav-brand">VISIOFLOW</div>
      <div class="nav-links">
        {% if session.is_admin %}
        <a href="{{ url_for('users.index') }}" class="nav-link">Gestionar Usuarios</a>
        {% endif %}
        <span class="user-info">Hola, {{ session.user.username }}</span>
        <a href="{{ url_for('auth.logout') }}" class="nav-link logout">Cerrar Sesión</a>
      </div>
    </nav>
    <main class="layout">
      <section class="panel video-panel">
        <h1>Contador de Personas - Flask + YOLOv8 + DeepSort</h1>
        <p class="subtitle">Stream en vivo y conteo por areas rectangulares</p>
        <div class="video-wrapper" id="video-wrapper">
          <img id="video-stream" src="{{ url_for('main.video_feed') }}" alt="Video en vivo" />
          <canvas id="draw-overlay" class="draw-overlay" aria-hidden="true"></canvas>
        </div>
        <p id="draw-hint" class="draw-hint"></p>
      </section>

      <aside class="panel side-panel">
        {% if session.get('is_admin') %}
        <h2>Agregar area</h2>
        <form id="area-form">
          <label>
            Nombre
            <input type="text" id="name" name="name" placeholder="Ej: Caja 1" required autocomplete="off" />
          </label>

          <input type="hidden" id="x1" name="x1" />
          <input type="hidden" id="y1" name="y1" />
          <input type="hidden" id="x2" name="x2" />
          <input type="hidden" id="y2" name="y2" />

          <div class="form-actions">
            <button type="button" id="btn-draw" class="btn-secondary">Dibujar area en el video</button>
            <button type="button" id="btn-cancel-draw" class="btn-ghost hidden">Cancelar dibujo</button>
          </div>

          <button type="submit" id="btn-save" disabled>Guardar area</button>
          <p id="form-message" class="form-message"></p>
        </form>
        {% endif %}

        <h2>Estadisticas</h2>
        <div id="stats-container" class="stats-container"></div>
      </aside>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
